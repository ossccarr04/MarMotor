<main>
  @if (isServerSleeping) {
    <div class="server-warning-banner">
      <div class="warning-content">
        <div class="spinner-mini"></div>
        <p>
          <strong>☕ El servidor está arrancando</strong><br>
          Estamos despertando la base de datos en la nube. Tardará unos 40-50 segundos. ¡Gracias por tu paciencia!
        </p>
      </div>
    </div>
  }

  <div id="page-wrapper">
    @if (mostrarHeader) {
      <app-header></app-header>
    }
    <router-outlet></router-outlet>
  </div>
</main>
