<div class="profile-container">
  <button class="avatar-btn" (click)="toggleMenu($event)" [class.active]="isMenuOpen">
    <div class="avatar-circle">
      <span class="user-initial">{{ userInitial }}</span>
    </div>
    <span class="chevron" [class.rotate]="isMenuOpen">▼</span>
  </button>

  @if (isMenuOpen) {
    <div class="profile-dropdown">
      <div class="dropdown-header">
        <span class="user-role">{{ userName }}</span>
        <p class="user-email">{{ userEmail }}</p>
      </div>
      
      <div class="dropdown-divider"></div>
      
      <ul class="dropdown-links">
        <li>
          <a routerLink="/users/me/profile" routerLinkActive="active-link" (click)="isMenuOpen = false" class="menu-item">
      <span class="icon">👤</span> Mi Perfil
    </a>
        </li>
        <li>
          <button class="menu-item logout-btn" (click)="onLogout()">
      <span class="icon">🚪</span> Cerrar Sesión
    </button>
        </li>
      </ul>
    </div>
  }
</div>
